# server=1: Aktivera RPC-servern
# printtoconsole=1: Logga till stdout (bra för Docker)
# listen=1: Lyssna på nätverksanslutningar (för P2P och RPC)
server=1
printtoconsole=1
listen=1
 
# P2P — lyssna på alla nätverksgränssnitt
# Generera med: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
rpcallowip=172.16.0.0/12
rpcbind=0.0.0.0
rpcuser=bitcoinrpc
rpcpassword=CHANGE_ME_TO_SOMETHING_SECURE
 
# Pruned node (~10 GB disk) — sätt prune=0 för full node (~750 GB)
# Pruning är inte kompatibelt med vissa funktioner som txindex,
# wallet och rescan. Se dokumentationen för detaljer.
# Enheten är MB, så prune=10000 betyder att vi behåller de senaste
# 10 GB av blockchain-data.
prune=10000

# Maximalt antal anslutningar — justera baserat på dina resurser och behov
maxconnections=40
 
# Databasminne (MB), ökas för snabbare initial sync och bättre prestanda
# För en full node rekommenderas minst 512 MB, men detta kan justeras baserat 
# på tillgängligt RAM. För en pruned node kan mindre dbcache fungera bra.
dbcache=512
