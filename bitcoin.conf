# server=1: Enable the RPC server
# printtoconsole=1: Log to stdout (good for Docker)
# listen=1: Listen for network connections (for P2P and RPC)
server=1
printtoconsole=1
listen=1

# P2P — Listen on all network interfaces
# Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
rpcallowip=172.16.0.0/12
rpcbind=0.0.0.0
rpcuser=bitcoinrpc
rpcpassword=CHANGE_ME_TO_SOMETHING_SECURE

# Pruned node (~10 GB disk) — set prune=0 for full node (~750 GB)
# Pruning is not compatible with some features such as txindex,
# wallet, and rescan. See the documentation for details.
# Unit is MB, so prune=10000 means we keep the last
# 10 GB of blockchain data.
prune=10000

# Maximum number of connections — adjust based on your resources and needs
maxconnections=40

# Database cache (MB), increase for faster initial sync and better performance
# For a full node, at least 512 MB is recommended, but this can be adjusted
# based on available RAM. For a pruned node, a smaller dbcache often works well.
dbcache=512
